version: '3.8'
services:
  web:
    build: .
    ports:
      - "8501:8501"
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///nifty_history.db # Can be swapped to postgres
    depends_on:
      - redis
    volumes:
      - .:/app
    
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - web
